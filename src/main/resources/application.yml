spring:
  application:
    name: prompt-ship-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/prompt_ship?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&useInformationSchema=true
    username: root
    password: 123456
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      persistent: false
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.xiaoyu.promptship.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
