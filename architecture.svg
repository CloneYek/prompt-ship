<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 580" role="img">
  <title>Prompt-Ship System Architecture</title>
  <desc>Layered architecture diagram showing user, frontend, backend, AI agents, data/services, and deployment layers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
    .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; }
    .tl { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 400; }
  </style>

  <!-- ===== Layer 1: 用户层 ===== -->
  <rect x="40" y="30" width="600" height="58" rx="16" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="th" x="65" y="63" fill="#0C447C">用户层</text>
  <rect x="135" y="41" width="88" height="36" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
  <text class="tl" x="179" y="59" text-anchor="middle" dominant-baseline="central" fill="#0C447C">浏览器</text>
  <rect x="235" y="41" width="135" height="36" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
  <text class="tl" x="302" y="59" text-anchor="middle" dominant-baseline="central" fill="#0C447C">SSE 流式交互</text>
  <rect x="385" y="41" width="145" height="36" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
  <text class="tl" x="457" y="59" text-anchor="middle" dominant-baseline="central" fill="#0C447C">对话式迭代修改</text>

  <!-- Arrow down -->
  <line x1="340" y1="88" x2="340" y2="112" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Layer 2: 前端层 ===== -->
  <rect x="40" y="112" width="600" height="58" rx="16" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th" x="65" y="145" fill="#085041">前端层</text>
  <rect x="135" y="123" width="80" height="36" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="tl" x="175" y="141" text-anchor="middle" dominant-baseline="central" fill="#085041">Vue 3</text>
  <rect x="225" y="123" width="130" height="36" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="tl" x="290" y="141" text-anchor="middle" dominant-baseline="central" fill="#085041">Ant Design Vue</text>
  <rect x="365" y="123" width="100" height="36" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="tl" x="415" y="141" text-anchor="middle" dominant-baseline="central" fill="#085041">TypeScript</text>
  <rect x="475" y="123" width="75" height="36" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="tl" x="512" y="141" text-anchor="middle" dominant-baseline="central" fill="#085041">Pinia</text>
  <rect x="560" y="123" width="68" height="36" rx="8" fill="#5DCAA5" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="ts" x="594" y="141" text-anchor="middle" dominant-baseline="central" fill="#085041">Vite</text>

  <!-- Arrow down -->
  <line x1="340" y1="170" x2="340" y2="194" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Layer 3: 后端层 ===== -->
  <rect x="40" y="194" width="600" height="88" rx="16" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="th" x="65" y="227" fill="#3C3489">后端层</text>
  <!-- Row 1: Core frameworks -->
  <rect x="135" y="208" width="125" height="36" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="tl" x="197" y="226" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Spring Boot 3</text>
  <rect x="270" y="208" width="115" height="36" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="tl" x="327" y="226" text-anchor="middle" dominant-baseline="central" fill="#3C3489">MyBatis-Flex</text>
  <rect x="395" y="208" width="115" height="36" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="tl" x="452" y="226" text-anchor="middle" dominant-baseline="central" fill="#3C3489">LangChain4j</text>
  <!-- Row 2: Sub components -->
  <rect x="135" y="252" width="110" height="28" rx="6" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="ts" x="190" y="266" text-anchor="middle" dominant-baseline="central" fill="#3C3489">SseEmitter</text>
  <rect x="255" y="252" width="100" height="28" rx="6" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="ts" x="305" y="266" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Knife4j</text>
  <rect x="365" y="252" width="100" height="28" rx="6" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="ts" x="415" y="266" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Caffeine</text>
  <rect x="475" y="252" width="110" height="28" rx="6" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="ts" x="530" y="266" text-anchor="middle" dominant-baseline="central" fill="#3C3489">@AuthCheck AOP</text>

  <!-- Arrow down -->
  <line x1="340" y1="282" x2="340" y2="310" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Layer 4: AI Agent 层 ===== -->
  <rect x="40" y="310" width="600" height="88" rx="16" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
  <text class="th" x="65" y="343" fill="#72243E">AI 层</text>
  <!-- Row 1: Agents -->
  <rect x="135" y="324" width="105" height="36" rx="8" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
  <text class="tl" x="187" y="342" text-anchor="middle" dominant-baseline="central" fill="#72243E">Router Agent</text>
  <rect x="250" y="324" width="105" height="36" rx="8" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
  <text class="tl" x="302" y="342" text-anchor="middle" dominant-baseline="central" fill="#72243E">Image Agent</text>
  <rect x="365" y="324" width="120" height="36" rx="8" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
  <text class="tl" x="425" y="342" text-anchor="middle" dominant-baseline="central" fill="#72243E">Code Gen Agent</text>
  <rect x="495" y="324" width="130" height="36" rx="8" fill="#ED93B1" stroke="#D4537E" stroke-width="0.5"/>
  <text class="tl" x="560" y="342" text-anchor="middle" dominant-baseline="central" fill="#72243E">Tool Calling</text>
  <!-- Row 2: Descriptions -->
  <rect x="135" y="368" width="105" height="28" rx="6" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
  <text class="ts" x="187" y="382" text-anchor="middle" dominant-baseline="central" fill="#993556">类型路由</text>
  <rect x="250" y="368" width="105" height="28" rx="6" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
  <text class="ts" x="302" y="382" text-anchor="middle" dominant-baseline="central" fill="#993556">素材收集</text>
  <rect x="365" y="368" width="120" height="28" rx="6" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
  <text class="ts" x="425" y="382" text-anchor="middle" dominant-baseline="central" fill="#993556">HTML / Vue</text>
  <rect x="495" y="368" width="130" height="28" rx="6" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
  <text class="ts" x="560" y="382" text-anchor="middle" dominant-baseline="central" fill="#993556">文件/依赖/图片</text>

  <!-- Arrow down -->
  <line x1="340" y1="398" x2="340" y2="422" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Layer 5: 数据 & 外部服务 ===== -->
  <!-- 数据层 (left half) -->
  <rect x="40" y="422" width="290" height="58" rx="16" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text class="th" x="65" y="455" fill="#633806">数据层</text>
  <rect x="135" y="433" width="95" height="36" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text class="tl" x="182" y="451" text-anchor="middle" dominant-baseline="central" fill="#633806">MySQL</text>
  <rect x="240" y="433" width="80" height="36" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text class="tl" x="280" y="451" text-anchor="middle" dominant-baseline="central" fill="#633806">HikariCP</text>

  <!-- 外部服务 (right half) -->
  <rect x="350" y="422" width="290" height="58" rx="16" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
  <text class="th" x="375" y="455" fill="#712B13">外部服务</text>
  <rect x="445" y="433" width="90" height="36" rx="8" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
  <text class="tl" x="490" y="451" text-anchor="middle" dominant-baseline="central" fill="#712B13">DeepSeek</text>
  <rect x="545" y="433" width="85" height="36" rx="8" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
  <text class="tl" x="587" y="451" text-anchor="middle" dominant-baseline="central" fill="#712B13">腾讯云</text>

  <!-- Arrow down -->
  <line x1="340" y1="480" x2="340" y2="504" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Layer 6: 部署层 ===== -->
  <rect x="40" y="504" width="600" height="58" rx="16" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="65" y="537" fill="#444441">部署层</text>
  <rect x="135" y="515" width="115" height="36" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="tl" x="192" y="533" text-anchor="middle" dominant-baseline="central" fill="#444441">Nginx :80</text>
  <rect x="260" y="515" width="120" height="36" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="tl" x="320" y="533" text-anchor="middle" dominant-baseline="central" fill="#444441">code_deploy</text>
  <rect x="390" y="515" width="140" height="36" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="tl" x="460" y="533" text-anchor="middle" dominant-baseline="central" fill="#444441">一键部署预览</text>
</svg>
