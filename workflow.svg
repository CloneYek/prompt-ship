<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 500" role="img">
  <title>Prompt-Ship Core Workflow</title>
  <desc>Vertical flowchart showing the data flow from user prompt through AI agents, code generation, build, and deployment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
    .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; }
    .tl { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 400; }
    .num { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 500; }
  </style>

  <!-- ===== Step 1: 用户输入 ===== -->
  <g>
    <rect x="180" y="30" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <circle cx="196" cy="46" r="12" fill="#378ADD"/>
    <text class="num" x="196" y="46" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB">1</text>
    <text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central" fill="#0C447C">用户输入 Prompt</text>
    <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central" fill="#185FA5">自然语言描述需求</text>
  </g>

  <!-- Arrow -->
  <line x1="340" y1="86" x2="340" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 2: 图片素材收集 ===== -->
  <g>
    <rect x="180" y="110" width="320" height="56" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
    <circle cx="196" cy="126" r="12" fill="#D4537E"/>
    <text class="num" x="196" y="126" text-anchor="middle" dominant-baseline="central" fill="#FBEAF0">2</text>
    <text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central" fill="#72243E">Image Agent 素材收集</text>
    <text class="ts" x="340" y="148" text-anchor="middle" dominant-baseline="central" fill="#993556">Pexels / undraw / Icons8 / 混元 Logo</text>
  </g>

  <!-- Arrow -->
  <line x1="340" y1="166" x2="340" y2="190" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 3: 智能路由 ===== -->
  <g>
    <rect x="180" y="190" width="320" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <circle cx="196" cy="206" r="12" fill="#D85A30"/>
    <text class="num" x="196" y="206" text-anchor="middle" dominant-baseline="central" fill="#FAECE7">3</text>
    <text class="th" x="340" y="208" text-anchor="middle" dominant-baseline="central" fill="#712B13">Router Agent 智能路由</text>
    <text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central" fill="#993C1D">判断: HTML / MultiFile / Vue</text>
  </g>

  <!-- Arrow -->
  <line x1="340" y1="246" x2="340" y2="270" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 4: 代码生成 (3 modes branching) ===== -->
  <!-- Branch connector -->
  <line x1="340" y1="270" x2="340" y2="278" stroke="#534AB7" stroke-width="1.5"/>
  <line x1="130" y1="278" x2="550" y2="278" stroke="#534AB7" stroke-width="1.5"/>
  <line x1="130" y1="278" x2="130" y2="290" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="278" x2="340" y2="290" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="278" x2="550" y2="290" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HTML mode -->
  <g>
    <rect x="45" y="290" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <circle cx="61" cy="306" r="12" fill="#534AB7"/>
    <text class="num" x="61" y="306" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">4a</text>
    <text class="th" x="130" y="308" text-anchor="middle" dominant-baseline="central" fill="#3C3489">HTML 单文件</text>
    <text class="ts" x="130" y="328" text-anchor="middle" dominant-baseline="central" fill="#534AB7">生成 index.html</text>
  </g>

  <!-- MultiFile mode -->
  <g>
    <rect x="255" y="290" width="170" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
    <circle cx="271" cy="306" r="12" fill="#7F77DD"/>
    <text class="num" x="271" y="306" text-anchor="middle" dominant-baseline="central" fill="#CECBF6">4b</text>
    <text class="th" x="340" y="308" text-anchor="middle" dominant-baseline="central" fill="#3C3489">多文件代码</text>
    <text class="ts" x="340" y="328" text-anchor="middle" dominant-baseline="central" fill="#534AB7">html + css + js</text>
  </g>

  <!-- Vue mode -->
  <g>
    <rect x="465" y="290" width="170" height="56" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
    <circle cx="481" cy="306" r="12" fill="#534AB7"/>
    <text class="num" x="481" y="306" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC">4c</text>
    <text class="th" x="550" y="308" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Vue 工程</text>
    <text class="ts" x="550" y="328" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Tool Calling 生成</text>
  </g>

  <!-- Merge connector -->
  <line x1="130" y1="346" x2="130" y2="356" stroke="#1D9E75" stroke-width="1.5"/>
  <line x1="340" y1="346" x2="340" y2="356" stroke="#1D9E75" stroke-width="1.5"/>
  <line x1="550" y1="346" x2="550" y2="356" stroke="#1D9E75" stroke-width="1.5"/>
  <line x1="130" y1="356" x2="550" y2="356" stroke="#1D9E75" stroke-width="1.5"/>
  <line x1="340" y1="356" x2="340" y2="376" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 5: 代码解析保存 ===== -->
  <g>
    <rect x="180" y="376" width="320" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
    <circle cx="196" cy="398" r="12" fill="#1D9E75"/>
    <text class="num" x="196" y="398" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">5</text>
    <text class="th" x="340" y="398" text-anchor="middle" dominant-baseline="central" fill="#085041">代码解析保存到磁盘</text>
  </g>

  <!-- Arrow -->
  <line x1="340" y1="420" x2="340" y2="440" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 6: 一键部署 ===== -->
  <g>
    <rect x="180" y="440" width="320" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <circle cx="196" cy="462" r="12" fill="#888780"/>
    <text class="num" x="196" y="462" text-anchor="middle" dominant-baseline="central" fill="#F1EFE8">6</text>
    <text class="th" x="340" y="462" text-anchor="middle" dominant-baseline="central" fill="#444441">一键部署 Nginx 预览</text>
  </g>
</svg>
